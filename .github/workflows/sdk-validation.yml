name: SDK Validation Automation Test

on:
  # Manual trigger
  workflow_dispatch:
    inputs:
      test_suite:
        description: 'Test suite to run'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - read_only
          - writeget_only
          - notify_only
      device_serial:
        description: 'BLE device serial number (e.g., 610031)'
        required: false
        type: string
      target_packets:
        description: 'Target packet count for long-duration test (e.g., 3600 = 1 hour)'
        required: false
        type: number

  # Schedule disabled - device tests run only from Wellysis repo
  # schedule:
  #   - cron: '0 0 * * *'

jobs:
  test:
    name: SDK Validation Test
    runs-on: self-hosted  # Self-hosted runner required (real device needed)

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check Python environment
        run: |
          python3 --version
          which python3

      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip
          pip3 install -r requirements.txt

      - name: Check Android device
        run: |
          echo "Checking for connected Android devices..."
          adb devices
          adb shell getprop ro.build.version.release

      - name: Check Appium server
        run: |
          echo "Checking if Appium server is running..."
          curl -s http://localhost:4723/status || echo "Appium server may not be running"

      - name: Run regression tests
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          APPIUM_SERVER_URL: http://localhost:4723/wd/hub
          APPIUM_DEVICE_NAME: ${{ secrets.DEVICE_ID || '55ETQWBXYE1RA1' }}
          BLE_DEVICE_SERIAL: ${{ github.event.inputs.device_serial || secrets.BLE_DEVICE_SERIAL }}
        run: |
          # Stop app first
          adb shell am force-stop com.wellysis.spatch.sdk.sample || true
          sleep 2

          # Determine which tests to run
          TEST_PATH="tests/regression/test_regression.py"
          if [ "${{ github.event.inputs.test_suite }}" = "read_only" ]; then
            TEST_PATH="tests/regression/test_regression.py::TestReadScreen"
          elif [ "${{ github.event.inputs.test_suite }}" = "writeget_only" ]; then
            TEST_PATH="tests/regression/test_regression.py::TestWriteGetScreen"
          elif [ "${{ github.event.inputs.test_suite }}" = "notify_only" ]; then
            TEST_PATH="tests/regression/test_regression.py::TestNotifyScreen"
          fi

          # Add target packets option if specified
          TARGET_PACKETS_OPTION=""
          if [ -n "${{ github.event.inputs.target_packets }}" ]; then
            TARGET_PACKETS_OPTION="--target-packets=${{ github.event.inputs.target_packets }}"
            echo "Running with target packets: ${{ github.event.inputs.target_packets }}"
          fi

          # Run tests
          python3 -m pytest $TEST_PATH \
            -v \
            --html=test-report.html \
            --self-contained-html \
            --json-report \
            --json-report-file=.report.json \
            --tb=short \
            $TARGET_PACKETS_OPTION \
            || true  # Don't fail workflow on test failure

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report-${{ github.run_number }}
          path: |
            test-report.html
            .report.json
            *.png
          retention-days: 30

      - name: Send Slack notification
        if: always()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: |
          if [ -n "$SLACK_WEBHOOK_URL" ]; then
            python3 scripts/send_slack_notification.py || echo "Failed to send Slack notification"
          else
            echo "SLACK_WEBHOOK_URL secret not configured"
          fi

      - name: Generate test summary
        if: always()
        run: |
          echo "## Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f .report.json ]; then
            python3 .github/scripts/generate_test_summary.py >> $GITHUB_STEP_SUMMARY
          fi

      - name: Fail if tests failed
        if: always()
        run: |
          if [ -f .report.json ]; then
            python3 .github/scripts/check_test_failure.py
          fi
