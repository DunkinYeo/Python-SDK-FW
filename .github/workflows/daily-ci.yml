name: Daily CI - Code Quality Check

on:
  # Runs daily at 9 AM KST (UTC 00:00)
  schedule:
    - cron: '0 0 * * *'

  # Manual trigger
  workflow_dispatch:

  # Trigger on push to main branch
  push:
    branches:
      - main
    paths:
      - '**.py'
      - 'requirements.txt'
      - '.github/workflows/daily-ci.yml'

jobs:
  code-quality:
    name: Code Quality & Dependency Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          echo "All dependencies installed"

      - name: Python syntax check
        run: |
          echo "Checking Python file syntax..."
          python -m py_compile tests/**/*.py scripts/**/*.py 2>/dev/null || true
          echo "Syntax check complete"

      - name: Project statistics
        run: |
          echo "## Project Statistics" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Python files:** $(find . -name '*.py' | wc -l)" >> $GITHUB_STEP_SUMMARY
          echo "- **Test files:** $(find tests -name 'test_*.py' 2>/dev/null | wc -l || echo 0)" >> $GITHUB_STEP_SUMMARY
          echo "- **Script files:** $(find scripts -name '*.py' 2>/dev/null | wc -l || echo 0)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Installed packages" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          pip list | grep -E "(pytest|appium|selenium)" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Send Slack notification
        if: always()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -n "$SLACK_WEBHOOK_URL" ]; then
            STATUS="Success"
            COLOR="good"
            if [ "${{ job.status }}" != "success" ]; then
              STATUS="Failed"
              COLOR="danger"
            fi

            PAYLOAD=$(cat <<EOF
          {
            "attachments": [{
              "color": "$COLOR",
              "title": "Daily CI - Code Quality Check",
              "text": "$STATUS",
              "fields": [
                {
                  "title": "Run time",
                  "value": "$(date '+%Y-%m-%d %H:%M:%S UTC')",
                  "short": true
                },
                {
                  "title": "Branch",
                  "value": "${{ github.ref_name }}",
                  "short": true
                }
              ],
              "actions": [{
                "type": "button",
                "text": "View details",
                "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
              }]
            }]
          }
          EOF
          )

            curl -X POST "$SLACK_WEBHOOK_URL" \
              -H 'Content-Type: application/json' \
              -d "$PAYLOAD"
          else
            echo "SLACK_WEBHOOK_URL not configured"
          fi

  device-test-reminder:
    name: Device Test Reminder
    runs-on: ubuntu-latest
    needs: code-quality

    steps:
      - name: Device test reminder
        run: |
          echo "## Device Test Reminder" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Daily CI only validates code quality." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**To run actual BLE device tests:**" >> $GITHUB_STEP_SUMMARY
          echo "1. Go to the Actions tab" >> $GITHUB_STEP_SUMMARY
          echo "2. Select 'SDK Validation Automation Test' workflow" >> $GITHUB_STEP_SUMMARY
          echo "3. Click 'Run workflow'" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Note:** Device tests require a self-hosted runner with a connected device." >> $GITHUB_STEP_SUMMARY
